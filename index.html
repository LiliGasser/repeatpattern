<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Repeat Pattern Creator</title>

    <link rel="stylesheet" type="text/css" href="style.css">
    <!-- fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/pda2xrb.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://unpkg.com/p5.js-svg@1.6.0"></script>

    <link rel="icon" href="./rcap-icon.svg" type="image/svg+xml">

  </head>

  <body>
    <div class="container">
        <h1>Repeat Pattern Creator</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="country">Country</label>
                <select id="country">
                </select>
            </div>

            <div class="control-group">
                <label for="motif">Motif</label>
                <select id="motif">
                    <option value="anglecircles" selected>Angle circles</option>
                    <option value="interlockingcirclesclose" >Interlocking circles close</option>
                    <option value="interlockingcirclesregular" >Interlocking circles regular</option>
                    <option value="3/4circles" >Three-quarter circles</option>
                    <option value="windwheel" >Wind wheel</option>
                    <option value="windwheel45" >Wind wheel +45°</option>
                    <option value="arc" >Pie</option>
                    <option value="arcdonut" >Donut</option>
                    <option value="arc2" >Arc</option>
                    <option value="flower" >Flower</option>
                    <option value="flower45" >Flower +45°</option>
                    <option value="squares" >Squares</option>
                    <option value="rectangles" >Rectangles 1</option>
                    <option value="rectangles2" >Rectangles 2</option>
                    <option value="rectangles3" >Rectangles 3</option>
                    <option value="circles" >Circles</option>
                    <option value="circles2" >Concentric circles</option>
                </select>
            </div>

            <div class="control-group">
                <label for="symmetry">Symmetry</label>
                <select id="symmetry">
                    <option value="Translation" selected>Translation</option>
                    <option value="180degreeRotations">180-degree rotations</option>
                    <option value="90degreeRotations" selected>90-degree rotations</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="showgrid">Show grid</label>
                <input type="checkbox" id="showgrid" />
            </div>

        </div>
        <div class="controls">
            <div class="control-group">
                <label for="layout">Layout</label>
                <select id="layout">
                    <option value="landscape" selected>Landscape</option>
                    <option value="portrait" >Portrait</option>
                </select>
            </div>

            <div class="control-group">
                <label for="framemargin">Frame margin ratio</label>
                <input type="number" id="framemargin" value="0.05" min="-0.5" max="0.5" step="0.01"/>
            </div>

            <div class="control-group">
                <label for="ncellsx"># motifs per row </label>
                <input type="number" id="ncellsx" value="11" min="1"/>
            </div>

            <div class="control-group">
                <label for="relmotifsize">Relative motif size </label>
                <input type="number" id="relmotifsize" value="1" min="0" max="5" step="0.1"/>
            </div>

            <!--
            <div class="control-group">
                <label for="rowindent">Row indent </label>
                <input type="number" id="rowindent" value="0" min="0" max="1" />
            </div>
            -->

        </div>
        <div class="controls">

            <div class="control-group">
                <label for="colorpalette">Color palette</label>
                <select id="colorpalette">
                    <option value="icecream" selected>Ice cream</option>
                    <option value="retro" >Retro</option>
                    <option value="custom" >Custom</option>
                </select>
            </div>

            <div class="color-container">
                <div class="color-group">
                    <label class="color-label" for="color1">WTP</label>
                    <input
                        type="color"
                        id="color1"
                        name="color1"
                        value="#ffffff"
                        colorspace="display-p3"
                        alpha />
                  </div>

                <div class="color-group">
                    <label class="color-label" for="color2">WTP Belief</label>
                    <input
                        type="color"
                        id="color2"
                        name="color2"
                        value="#ffffff"
                        colorspace="display-p3"
                        alpha />
                  </div>

                <div class="color-group">
                    <label class="color-label" for="color3">Social Norm</label>
                    <input
                        type="color"
                        id="color3"
                        name="color3"
                        value="#ffffff"
                        colorspace="display-p3"
                        alpha />
                  </div>

                <div class="color-group">
                    <label class="color-label" for="color4">Government</label>
                    <input
                        type="color"
                        id="color4"
                        name="color4"
                        value="#ffffff"
                        colorspace="display-p3"
                        alpha />
                  </div>

                <div class="color-group">
                    <label class="color-label" for="colorbg">Background</label>
                    <input
                        type="color"
                        id="colorbg"
                        name="colorbg"
                        value="#ffffff"
                        colorspace="display-p3"
                        alpha />
                  </div>
            </div>

        <!--
        </div>
        <div class="controls">
            -->

            <div class="control-group">
                <label for="typefacetitle">Title typeface</label>
                <select id="typefacetitle">
                    <option value="the-seasons" selected>The Seasons</option>
                    <option value="gelato-luxe" >Gelato Luxe</option>
                    <option value="miller-display" >Miller Display</option>
                </select>
            </div>

            <div class="control-group">
                <label for="typefacetext">Text typeface</label>
                <select id="typefacetext">
                    <option value="soleil" selected>Soleil</option>
                    <option value="sofia-pro">Sofia Pro</option>
                    <option value="halcom" >Halcom</option>
                    <option value="benton-modern-display" >Benton Modern Display</option>
                </select>
            </div>

            <div class="button">
              <button id="exportButton">Export as SVG</button>
            </div>
        </div>
        
        <div class="canvas-container">
            <!-- Canvas will be inserted here by p5.js -->
        </div>

        <div class="canvas-container-back">
            <!-- Canvas will be inserted here by p5.js -->
        </div>

        <div class="canvas-container-motif">
            <!-- Canvas will be inserted here by p5.js -->
        </div>

    <script src="sketch.js"></script>
  </body>
</html>
